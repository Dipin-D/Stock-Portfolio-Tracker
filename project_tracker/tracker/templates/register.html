{% extends "home.html" %}

{% block title %}
Register
{% endblock %}

{% block content %}
<div class="container" style="padding-top: 3rem;">
    <div class="text-center" style="max-width: 400px; margin: auto; padding: 2rem; background: #f4f4f4; border-radius: 8px; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);">
        <h2 style="color: #333;">Register</h2> 

        <form method="post" action="{% url 'register' %}">
            {% csrf_token %}
            {{ form.as_p }}

            <button class="btn btn-primary w-100 mt-3" type="submit" style="background-color: #007BFF; border: none; padding: 10px; border-radius: 4px;">
                Register
            </button>
        </form>

        <p class="mt-3" style="color: #555;">Already have an account? 
            <a href="{% url 'login' %}" style="color: #007BFF; text-decoration: none;">Login</a>
        </p>
    </div>
</div>

<style>
    .btn-primary:hover {
        background-color: #0056b3;
        transition: background-color 0.2s ease;
    }
</style>
{% endblock %}
